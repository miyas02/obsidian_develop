name: Sync Obsidian Vault to Google Drive

on:
  push:
    branches:
      - master
  workflow_dispatch:  # 手動実行ボタンを有効化

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rclone
        run: sudo curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          # GitHub Secrets に保存したトークンを呼び出す
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        run: |
          mkdir -p ~/.config/rclone
          
          # rclone.conf をトークン方式で作成
          cat <<EOF > $HOME/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          scope = drive
          # ここに Secrets から取得した JSON トークンが入ります
          token = $GDRIVE_TOKEN
          # 保存先となるフォルダID（あなたのメインストレージ内）
          root_folder_id = 1zN2YD4Yf907y1vlVL0S-4iz7iq_BbwsI
          EOF

      - name: rclone sync
        run: |
          # gdrive: の後ろを空にすることで root_folder_id の直下に同期されます
          rclone sync . gdrive: \
            --filter "+ *.md" \
            --filter "+ *.pdf" \
            --filter "+ *.png" \
            --filter "+ *.jpg" \
            --filter "- .git/**" \
            --filter "- .obsidian/**" \
            --filter "- **" \
            --drive-use-trash \
            -v
