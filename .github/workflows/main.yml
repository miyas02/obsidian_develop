name: Sync Obsidian Vault to Google Drive

on:
  push:
    branches:
      - master
  workflow_dispatch:  # 手動実行ボタンを有効化

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rclone
        run: sudo curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          GDRIVE_JSON: ${{ secrets.GDRIVE_JSON }}
        run: |
          mkdir -p ~/.config/rclone
          # サービスアカウントのJSONを書き出し
          echo "$GDRIVE_JSON" > $HOME/.config/rclone/service-account.json
          
          # rclone.conf の作成
          cat <<EOF > $HOME/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          service_account_file = $HOME/.config/rclone/service-account.json
          root_folder_id = 1zN2YD4Yf907y1vlVL0S-4iz7iq_BbwsI
          scope = drive
          EOF

      - name: rclone sync
        run: |
          # 修正済み：gdrive: の後ろは空でOK
          rclone sync . gdrive: \
            --filter "+ *.md" \
            --filter "+ *.pdf" \
            --filter "+ *.png" \
            --filter "+ *.jpg" \
            --filter "- .git/**" \
            --filter "- .obsidian/**" \
            --filter "- **" \
            --drive-use-trash \
            -v
