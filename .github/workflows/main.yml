name: Sync Obsidian Vault to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. rcloneをインストール
      - name: Install rclone
        run: sudo curl https://rclone.org/install.sh | sudo bash

      # 2. rcloneの設定ファイルを生成
      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          service_account_contents = ${{ secrets.GDRIVE_JSON }}
          EOF

      # 3. 同期実行（フォルダIDをシークレットから取得）
      - name: rclone sync
        run: |
          rclone sync . gdrive:${{ secrets.GDRIVE_FOLDER_ID }} \
            --include "*.md" \
            --include "*.pdf" \
            --include "*.png" \
            --include "*.jpg" \
            --exclude ".git/**" \
            --exclude ".obsidian/**" \
            --drive-use-trash \
            -v
